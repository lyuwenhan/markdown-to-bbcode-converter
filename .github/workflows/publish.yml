name: Publish npm Package

on:
  push:
    branches:
      - main
    paths:
      - "status.json"
      - "package.json"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Check status.json
        id: status
        run: |
          node script/index.js >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.status.outputs.needs_update == 'true'
        run: npm ci

      - name: Test
        if: steps.status.outputs.needs_update == 'true'
        run: npm test --if-present

      - name: Check package contents
        if: steps.status.outputs.needs_update == 'true'
        run: npm publish --dry-run

      - name: Publish to npm
        if: steps.status.outputs.needs_update == 'true'
        run: npm publish --provenance

      - name: Skip publish
        if: steps.status.outputs.needs_update != 'true'
        run: echo "status.json says needsUpdate=false, skipping publish."

      - name: Commit and push status updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto-build npm package by github-actions[bot]"

          for i in 1 2 3 4 5; do
            echo "Attempt $i to pull --rebase and push..."
            git pull --rebase origin main && git push origin HEAD:main && break

            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi

            echo "Retrying in 5 seconds..."
            sleep 5
          done
